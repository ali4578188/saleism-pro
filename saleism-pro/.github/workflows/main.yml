name: Build SALEISM PRO APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter 3.22.3
        run: |
          curl -fsSL "https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.22.3-stable.tar.xz" -o /tmp/flutter.tar.xz
          tar xf /tmp/flutter.tar.xz -C $HOME
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Verify Flutter & Dart version
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter --version
          dart --version

      - name: Create required asset directories
        run: mkdir -p assets/images

      - name: Install dependencies
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter pub get

      - name: Build release APK
        run: |
          export PATH="$HOME/flutter/bin:$PATH"
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: SALEISM-PRO-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
