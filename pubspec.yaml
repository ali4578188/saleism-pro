name: saleism_pro
description: SALEISM PRO - Professional Wholesale Inventory & Sales Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # PDF & Printing
  pdf: ^3.10.8
  printing: ^5.13.1

  # Excel Export
  excel: ^4.0.3

  # Sharing
  share_plus: ^9.0.0

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Biometric Auth
  local_auth: ^2.2.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Date & Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2

  # File operations
  file_picker: ^8.1.2
  open_file: ^3.3.2
  permission_handler: ^11.3.1

  # Icons
  flutter_vector_icons: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
