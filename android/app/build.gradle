plugins {
      id "com.android.application"
      id "kotlin-android"
  }

  def localProperties = new Properties()
  def localPropertiesFile = rootProject.file('local.properties')
  if (localPropertiesFile.exists()) {
      localPropertiesFile.withReader('UTF-8') { reader ->
          localProperties.load(reader)
      }
  }

  def flutterRoot = localProperties.getProperty('flutter.sdk')
  assert flutterRoot != null, "Flutter SDK not found. Define flutter.sdk in local.properties."

  def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
  def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

  // Apply Flutter plugin directly — avoids includeBuild and the groovy.xml.QName issue
  apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

  android {
      namespace "com.saleismpro.app"
      compileSdk 35
      ndkVersion flutter.ndkVersion

      compileOptions {
          sourceCompatibility JavaVersion.VERSION_1_8
          targetCompatibility JavaVersion.VERSION_1_8
      }

      kotlinOptions {
          jvmTarget = '1.8'
      }

      sourceSets {
          main.java.srcDirs += 'src/main/kotlin'
      }

      defaultConfig {
          applicationId "com.saleismpro.app"
          minSdkVersion 23
          targetSdkVersion 35
          versionCode flutterVersionCode.toInteger()
          versionName flutterVersionName
      }

      buildTypes {
          release {
              signingConfig signingConfigs.debug
              minifyEnabled true
              proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
          }
          debug {
              applicationIdSuffix ".debug"
          }
      }
  }

  flutter {
      source '../..'
  }

  dependencies {
      implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
  }
  