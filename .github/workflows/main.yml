name: Build SALEISM PRO APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - run: flutter create --platforms=android --project-name=saleism_pro --org=com.saleismpro --overwrite .

      - run: git checkout -- lib pubspec.yaml

      # Patch Kotlin version in the freshly generated settings.gradle
      # to a known-working version (fixes "unresolved Kotlin plugin version" errors)
      - run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.1.0"/' android/settings.gradle

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: SALEISM-PRO-APK
          path: build/app/outputs/flutter-apk
          retention-days: 30
